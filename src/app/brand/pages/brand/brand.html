<c-row class="mb-3">
  <c-col>
    <h4>{{ title }}</h4>
  </c-col>
  <c-col class="text-end">
    <button cButton color="primary" (click)="openModal()">
      <svg cIcon name="cilPlus"></svg>
      Nueva Marca
    </button>
  </c-col>
</c-row>

<c-card class="mb-3">
  <c-card-body>
    <c-row class="g-3 align-items-end" [formGroup]="form">
      <c-col sm="12" md="6" lg="4">
        <label for="">Nombre</label>
        <input formControlName="marca_nom" type="text" class="form-control" placeholder="Buscar por nombre..." />
      </c-col>
      <c-col>
        <button cButton color="primary" (click)="onSearch()" class="me-2">
          <svg cIcon name="cilSearch"></svg>
          Buscar
        </button>
        <button cButton color="danger" (click)="onClean()">
          <svg cIcon name="cilTrash"></svg>
          Limpiar
        </button>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>

<c-card>
  <c-card-body>
    <table cTable striped="true">
      <thead>
        <tr>
          <th>Acciones</th>
          <th>Código</th>
          <th>Nombre</th>
        </tr>
      </thead>
      <tbody>
        @for (marca of marcas; track $index) {
          <tr>
            <td>
              <button (click)="openModal(marca.marca_id)" size="sm" class="me-2" cButton color="info">
                <svg cIcon name="cilPencil"></svg>
              </button>
              <button (click)="onDelete(marca.marca_id)" size="sm" cButton color="danger">
                <svg cIcon name="cilTrash"></svg>
              </button>
            </td>
            <td>{{ marca.marca_codigo }}</td>
            <td>{{ marca.marca_nom }}</td>
          </tr>
        }
        @if (marcas.length === 0) {
          <tr>
            <td colspan="4">No se encontraron marcas</td>
          </tr>
        }
      </tbody>
    </table>
    <app-paginator [(page)]="page.page" [pageSize]="page.pageSize" [total]="total"
      (pageChange)="onPageChange($event)"></app-paginator>
  </c-card-body>
</c-card>

<app-brand-new-edit-modal #brandNewEditModal></app-brand-new-edit-modal>
