<div class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center">
  <c-container breakpoint="md">
    <c-row class="justify-content-center">
      <c-col lg="5" xl="5">
        <c-card-group>
          <c-card class="p-4">
            <c-card-body>
              <form cForm [formGroup]="form" (ngSubmit)="onLogin()">
                <h1>{{ loginStructure.title }}</h1>
                <p class="text-body-secondary">{{ loginStructure.description }}</p>
                @for (item of loginStructure.forms; track $index) {
                <c-input-group class="mb-3">
                  <span cInputGroupText>
                    <svg cIcon [name]="item.icon"></svg>
                  </span>
                  <input [formControlName]="item.formControlName" autocomplete="on" cFormControl
                    [placeholder]="item.placeholder" [type]="item.formControlType" />
                </c-input-group>
                }
                <c-row>
                  <c-col xs="6">
                    <button cButton class="px-4" color="primary" type="submit" [disabled]="form.invalid">
                      Login
                    </button>
                  </c-col>
                </c-row>
              </form>
            </c-card-body>
          </c-card>
        </c-card-group>
      </c-col>
    </c-row>
  </c-container>
</div>
