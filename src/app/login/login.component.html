<main class="login-main">
  <div class="login-wrapper">
    <!-- Logo -->
    <div class="login-logo animate__animated animate__fadeInDown">
      <img src="logo-factulink.png" alt="FactuLink Logo" />
    </div>

    <!-- Card de Login -->
    <c-card class="login-card animate__animated animate__fadeInUp">
      <c-card-body class="login-card-body">
        <div class="login-header">
          <h1>{{ loginStructure.title }}</h1>
          <p>{{ loginStructure.description }}</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onLogin()" class="login-form">
          @for (item of loginStructure.forms; track $index) {
          <div class="form-group">
            <label class="form-label" [for]="item.formControlName">
              {{ item.name === 'usuario' ? 'Correo electrónico' : 'Contraseña' }}
            </label>
            <div class="input-container">
              <svg cIcon [name]="item.icon" class="input-icon"></svg>
              <input [id]="item.formControlName" [formControlName]="item.formControlName" [type]="item.formControlType"
                class="form-control" [placeholder]="item.placeholder" autocomplete="on" />
            </div>
          </div>
          }

          <button cButton class="btn-login" type="submit" [disabled]="form.invalid || isLoading()">
            @if (!isLoading()) {
            <ng-container>
              Ingresar
            </ng-container>

            }@else {
              <c-spinner size="sm" class="me-2"></c-spinner>
              Ingresando...
            }
          </button>
        </form>
      </c-card-body>
    </c-card>

    <!-- Footer -->
    <p class="login-footer">
      Sistema de Facturación Electrónica
    </p>
  </div>
</main>
