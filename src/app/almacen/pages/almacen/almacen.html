<c-row>
    <c-col xs="12">
        <c-card class="mb-4">
            <c-card-body>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">{{ title }}</h4>
                    <div class="d-flex align-items-center gap-3">
                        <c-button-group role="group" size="sm">
                            <button (click)="setViewMode('cards')" [active]="viewMode === 'cards'" cButton
                                color="secondary" variant="outline">
                                <svg cIcon name="cil-grid" class="me-1"></svg>
                                Cards
                            </button>
                            <button (click)="setViewMode('table')" [active]="viewMode === 'table'" cButton
                                color="secondary" variant="outline">
                                <svg cIcon name="cil-list" class="me-1"></svg>
                                Tabla
                            </button>
                        </c-button-group>
                        <button (click)="openModal()" cButton color="primary">
                            <svg cIcon name="cil-plus" class="me-2"></svg>
                            Nuevo Almacén
                        </button>
                    </div>
                </div>

                <form [formGroup]="form" class="row g-3 mb-4">
                    <c-col md="4">
                        <label cLabel>Nombre de Almacén</label>
                        <input cFormControl class="form-control" type="text" formControlName="alm_nom"
                            placeholder="Buscar por nombre..." (keyup.enter)="onSearch()" />
                    </c-col>
                    <c-col md="3">
                        <label cLabel>Sucursal</label>
                        <select cSelect formControlName="suc_id" (change)="onSearch()">
                            <option [value]="null">Todas</option>
                            <option *ngFor="let sucursal of sucursales" [value]="sucursal.suc_id">
                                {{ sucursal.suc_nom }}
                            </option>
                        </select>
                    </c-col>
                    <c-col md="2">
                        <label cLabel>Estado</label>
                        <select cSelect formControlName="est" (change)="onSearch()">
                            <option [value]="true">Activo</option>
                            <option [value]="false">Inactivo</option>
                        </select>
                    </c-col>
                    <c-col md="3" class="d-flex align-items-end gap-2">
                        <button (click)="onSearch()" cButton color="primary">
                            <svg cIcon name="cil-search" class="me-2"></svg>
                            Buscar
                        </button>
                        <button (click)="onClean()" cButton color="danger">
                            <svg cIcon name="cil-trash" class="me-2"></svg>
                            Limpiar
                        </button>
                    </c-col>
                </form>

                <div *ngIf="viewMode === 'cards'">
                    <c-row *ngIf="almacenes.length > 0">
                        <c-col xs="12" sm="6" lg="4" *ngFor="let item of almacenes; let i = index">
                            <c-card class="mb-3">
                                <c-card-header class="d-flex justify-content-between align-items-center">
                                    <div class="d-flex align-items-center gap-2">
                                        <svg cIcon name="cil-inbox" size="lg"></svg>
                                        <strong>{{ item.nombre }}</strong>
                                    </div>
                                    <c-badge [color]="item.activo ? 'success' : 'danger'">
                                        {{ item.activo ? 'Activo' : 'Inactivo' }}
                                    </c-badge>
                                </c-card-header>
                                <c-card-body>
                                    <div class="mb-2">
                                        <svg cIcon name="cil-building" class="me-2"></svg>
                                        {{ item.sucursal?.suc_nom }}
                                    </div>
                                    <div class="d-flex gap-2 mt-3">
                                        <button (click)="viewStock(item)" cButton color="info" size="sm">
                                            <svg cIcon name="cil-list-numbered" class="me-1"></svg>
                                            Stock
                                        </button>
                                        <button (click)="openModal(item.almacen_id)" cButton color="warning" size="sm">
                                            <svg cIcon name="cil-pencil"></svg>
                                        </button>
                                        <button (click)="onDelete(item.almacen_id)" cButton color="danger" size="sm">
                                            <svg cIcon name="cil-trash"></svg>
                                        </button>
                                    </div>
                                </c-card-body>
                            </c-card>
                        </c-col>
                    </c-row>
                    <div *ngIf="almacenes.length === 0" class="text-center py-5">
                        <svg cIcon name="cil-storage" size="3xl" class="text-secondary mb-3"></svg>
                        <p class="text-secondary">No se encontraron resultados</p>
                    </div>
                </div>

                <div *ngIf="viewMode === 'table'" class="table-responsive">
                    <table [hover]="true" [striped]="true" cTable>
                        <thead>
                            <tr>
                                <th>Acciones</th>
                                <th>Nombre</th>
                                <th>Sucursal</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let item of almacenes; let i = index">
                                <td>
                                    <button (click)="viewStock(item)" cButton color="info" size="sm" class="me-1"
                                        title="Ver Stock">
                                        <svg cIcon name="cil-list-numbered"></svg>
                                        Stock
                                    </button>
                                    <button (click)="openModal(item.almacen_id)" cButton color="warning" size="sm"
                                        class="me-1" title="Editar">
                                        <svg cIcon name="cil-pencil"></svg>
                                    </button>
                                    <button (click)="onDelete(item.almacen_id)" cButton color="danger" size="sm"
                                        title="Desactivar">
                                        <svg cIcon name="cil-trash"></svg>
                                    </button>
                                </td>
                                <td>{{ item.nombre }}</td>
                                <td>{{ item.sucursal?.suc_nom }}</td>
                                <td>
                                    <span class="badge" [ngClass]="item.activo ? 'bg-success' : 'bg-danger'">
                                        {{ item.activo ? 'Activo' : 'Inactivo' }}
                                    </span>
                                </td>

                            </tr>
                            <tr *ngIf="almacenes.length === 0">
                                <td colspan="5" class="text-center py-3">No se encontraron resultados</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-3">
                    <app-paginator [total]="total" [pageSize]="page.pageSize"
                        (pageChange)="onPageChange($event)"></app-paginator>
                </div>
            </c-card-body>
        </c-card>
    </c-col>
</c-row>

<app-almacen-modal #almacenModal></app-almacen-modal>
