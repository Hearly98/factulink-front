<c-modal alignment="center" [visible]="visible" backdrop="static" size="lg">
  <c-modal-body class="modal-body">
    <c-row class="mb-2">
      <c-col [sm]="6" class="space-between">
        <h5>{{ title }}</h5>
      </c-col>
    </c-row>
    <c-card>
      <c-card-body [formGroup]="form">
        <c-row>
          @for(item of structure; track $index){
          <c-col [md]="item.col" class="mb-2">
            <label for="" class="form-label">{{ item.label }}</label>
            @switch (item.type) { @case ('select') {
            <select class="form-control form-select" name="" id="" [formControlName]="item.formControlName">
              <option [ngValue]="null">Seleccione</option>
              @for(dataItem of getDataSource(item); track $index){
              <option [ngValue]="getIdField(item, dataItem)">
                {{ getDisplayField(item, dataItem) }}
              </option>
              }
            </select>
            } @case ('number') {
            <input class="form-control" type="number" name="" id="" [formControlName]="item.formControlName" />
            } @case ('date') {
            <input class="form-control" type="date" name="" id="" [formControlName]="item.formControlName" />
            } @case ('file') {
            <div class="d-flex flex-column align-items-start gap-2">
              <label class="btn btn-outline-primary btn-sm mt-1">
                <svg cIcon name="cilCloudUpload" class="me-1"></svg>
                {{ selectedFile ? 'Cambiar Imagen' : 'Seleccionar Imagen' }}
                <input
                  type="file"
                  class="d-none"
                  (change)="onChange($event)"
                  accept="image/jpeg,image/png,image/jpg"
                />
              </label>
              
              @if (imagePreview()) {
                <div class="position-relative mt-2">
                  <img [src]="imagePreview()" alt="Imagen Preview" 
                       class="img-thumbnail shadow-sm" 
                       style="width: 100px; height: 100px; object-fit: contain; background: #f8f9fa;" />
                  <button (click)="removeImage()" 
                          class="btn btn-danger btn-sm position-absolute top-0 start-100 translate-middle rounded-circle p-1"
                          style="line-height: 1;"
                          type="button">
                    <svg cIcon name="cilX" size="sm"></svg>
                  </button>
                </div>
              }
              
              <small class="text-muted" style="font-size: 0.75rem;">
                Límite: <strong class="text-primary">50KB</strong> (JPG, PNG)
              </small>
            </div>
            } @default {
            <input class="form-control" type="text" name="" id="" [formControlName]="item.formControlName" />
            } }
          </c-col>
          }
          @if (!isEditMode) {
          <c-col md="12" class="mb-2">
            <label class="form-label">Sucursales</label>
            <div class="d-flex gap-2 align-items-center">
              <button type="button" cButton color="primary" variant="outline" (click)="openSucursalSelector()"
                class="flex-grow-1">
                <svg cIcon name="cilBuilding"></svg>
                Seleccionar Sucursales
              </button>
            </div>
            <small class="text-muted d-block mt-1">
              {{ getSucursalNames() }}
            </small>
          </c-col>
          }
        </c-row>
      </c-card-body>
    </c-card>
  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" class="me-2" (click)="onClose()">
      <svg cIcon name="cilX"></svg>
      Cancelar
    </button>
    <button cButton color="success" (click)="onSubmit()">
      <svg cIcon name="cilSave"></svg>
      Guardar
    </button>
  </c-modal-footer>

  <app-sucursal-selector-modal></app-sucursal-selector-modal>
</c-modal>
