<c-row>
  <c-col md="12" xl="3">
    <c-widget-stat-a
      class="mb-4"
      color="primary"
      [title]="'Widget Title'"
    >
      <ng-template cTemplateId="widgetValueTemplate" ngPreserveWhitespaces>
        $9000
        <span class="fs-6 fw-normal">
      (40.9% <svg cIcon name="cilArrowTop"></svg>)
    </span>
      </ng-template>
      <ng-template cTemplateId="widgetChartTemplate">
        <c-chart [data]="dataWidget" [options]="optionsWidget" class="mt-3 mx-3" height="110" type="line" />
      </ng-template>
    </c-widget-stat-a>
  </c-col>
