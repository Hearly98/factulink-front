<c-row>
    <c-col xs="12">
        <c-card class="mb-4">
            <c-card-body>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">{{ title }}</h4>
                    <button [routerLink]="['/movimientos']" cButton color="secondary" variant="ghost">
                        <svg cIcon name="cil-arrow-left" class="me-2"></svg>
                        Volver
                    </button>
                </div>

                <form [formGroup]="form">
                    <c-row class="g-3">
                        <!-- Cabecera -->
                        <c-col md="2" *ngIf="isEdit">
                            <label cLabel>Nro Movimiento</label>
                            <input cFormControl formControlName="mov_id" readonly />
                        </c-col>

                        <c-col md="2">
                            <label cLabel>Fecha <span class="text-danger">*</span></label>
                            <input cFormControl type="date" formControlName="mov_fec" />
                        </c-col>

                        <c-col [md]="isEdit ? 3 : 5">
                            <label cLabel>Tipo de Movimiento <span class="text-danger">*</span></label>
                            <select cSelect formControlName="mov_tip">
                                <option value="TRANSFERENCIA">Transferencia Entre Almacenes</option>
                                <option value="INGRESO">Ingreso a Almacén</option>
                                <option value="SALIDA">Salida de Almacén</option>
                                <option value="AJUSTE">Ajuste de Inventario</option>
                            </select>
                        </c-col>

                        <c-col md="5"
                            *ngIf="form.get('mov_tip')?.value === 'TRANSFERENCIA' || form.get('mov_tip')?.value === 'SALIDA'">
                            <label cLabel>Almacén Origen <span class="text-danger">*</span></label>
                            <select cSelect formControlName="alm_id_ori">
                                <option [value]="null">Seleccione origen</option>
                                <option *ngFor="let alm of almacenes" [value]="alm.alm_id">
                                    {{ alm.alm_nom }}
                                </option>
                            </select>
                        </c-col>

                        <c-col md="5" *ngIf="form.get('mov_tip')?.value !== 'SALIDA'">
                            <label cLabel>Almacén Destino <span class="text-danger">*</span></label>
                            <select cSelect formControlName="alm_id_des">
                                <option [value]="null">Seleccione destino</option>
                                <option *ngFor="let alm of almacenes" [value]="alm.alm_id">
                                    {{ alm.alm_nom }}
                                </option>
                            </select>
                        </c-col>

                        <c-col md="12">
                            <label cLabel>Motivo <span class="text-danger">*</span></label>
                            <input cFormControl formControlName="mov_mot"
                                placeholder="Ej: Abastecimiento, Devolución, etc." />
                        </c-col>

                        <c-col md="6" *ngIf="form.get('mov_tip')?.value === 'TRANSFERENCIA'">
                            <label cLabel>Recibido por</label>
                            <input cFormControl formControlName="mov_rec"
                                placeholder="Nombre de la persona que recibe" />
                        </c-col>

                        <!-- Guía de Remisión -->
                        <c-col md="12" *ngIf="form.get('mov_tip')?.value !== 'SALIDA'">
                            <c-form-check class="mt-2">
                                <input cFormCheckInput type="checkbox" id="con_gui_rem" formControlName="con_gui_rem" />
                                <label cFormCheckLabel for="con_gui_rem">¿Incluye Guía de Remisión?</label>
                            </c-form-check>
                        </c-col>

                        <c-col md="12">
                            <div [visible]="!!form.get('con_gui_rem')?.value" cCollapse>
                                <div class="p-3 border rounded bg-light mt-2">
                                    <c-row class="g-3">
                                        <c-col md="4">
                                            <label cLabel>Nro Guía</label>
                                            <input cFormControl formControlName="gui_rem_num"
                                                placeholder="001-000000" />
                                        </c-col>
                                        <c-col md="4">
                                            <label cLabel>Fecha Guía</label>
                                            <input cFormControl type="date" formControlName="gui_rem_fec" />
                                        </c-col>
                                        <c-col md="4">
                                            <label cLabel>Transportista / Traslado</label>
                                            <input cFormControl formControlName="gui_rem_tra" />
                                        </c-col>
                                    </c-row>
                                </div>
                            </div>
                        </c-col>

                        <hr class="my-4">

                        <!-- Detalle de Productos -->
                        <c-col md="12">
                            <h5>Detalle de Productos</h5>
                            <div class="row g-2 mb-3">
                                <c-col md="7">
                                    <label cLabel>Producto</label>
                                    <select cSelect formControlName="temp_prod_id">
                                        <option [value]="null">Buscar producto...</option>
                                        <option *ngFor="let prod of productos" [value]="prod.prod_id">
                                            {{ prod.prod_nom }} ({{ prod.prod_cod_interno }})
                                        </option>
                                    </select>
                                </c-col>
                                <c-col md="3">
                                    <label cLabel>Cantidad</label>
                                    <input cFormControl type="number" formControlName="temp_cant" min="1" />
                                </c-col>
                                <c-col md="2" class="d-flex align-items-end">
                                    <button (click)="addProduct()" cButton color="dark" class="w-100">
                                        <svg cIcon name="cil-plus" class="me-2"></svg>
                                        Agregar
                                    </button>
                                </c-col>
                            </div>

                            <table cTable [hover]="true" [striped]="true">
                                <thead>
                                    <tr>
                                        <th>Código</th>
                                        <th>Producto</th>
                                        <th class="text-center" style="width: 150px;">Cantidad</th>
                                        <th class="text-end" style="width: 100px;">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody formArrayName="details">
                                    <tr *ngFor="let det of detailsArray.controls; let i = index" [formGroupName]="i">
                                        <td>{{ det.get('prod_cod')?.value }}</td>
                                        <td>{{ det.get('prod_nom')?.value }}</td>
                                        <td class="text-center">
                                            <input cFormControl type="number" formControlName="cant"
                                                class="text-center" />
                                        </td>
                                        <td class="text-end">
                                            <button (click)="removeDetail(i)" cButton color="danger" size="sm">
                                                <svg cIcon name="cil-trash"></svg>
                                            </button>
                                        </td>
                                    </tr>
                                    <tr *ngIf="detailsArray.length === 0">
                                        <td colspan="4" class="text-center py-3 text-muted italic">
                                            No se han agregado productos al movimiento
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </c-col>

                        <c-col md="12" class="d-flex justify-content-end mt-4">
                            <button (click)="onSubmit()" cButton color="primary" size="lg" class="px-5">
                                <svg cIcon name="cil-save" class="me-2"></svg>
                                {{ isEdit ? 'Actualizar' : 'Guardar' }} Movimiento
                            </button>
                        </c-col>
                    </c-row>
                </form>
            </c-card-body>
        </c-card>
    </c-col>
</c-row>
