<c-row>
  <c-col xs="12">
    <c-card class="mb-4">
      <c-card-body>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 class="mb-0">{{ title }}</h4>
          <button [routerLink]="['/nuevo-movimiento']" cButton color="primary">
            <svg cIcon name="cil-plus" class="me-2"></svg>
            Nuevo Movimiento
          </button>
        </div>

        <form [formGroup]="filterForm" class="row g-3 mb-4">
          <c-col md="3">
            <label cLabel>Tipo</label>
            <select cSelect formControlName="mov_tip" (change)="onSearch()">
              <option [value]="null">Todos</option>
              <option value="TRANSFERENCIA">Transferencia</option>
              <option value="INGRESO">Ingreso</option>
              <option value="SALIDA">Salida</option>
              <option value="AJUSTE">Ajuste</option>
            </select>
          </c-col>
          <c-col md="2">
            <label cLabel>Almacén</label>
            <select cSelect formControlName="alm_id" (change)="onSearch()">
              <option [value]="null">Todos</option>
              <option *ngFor="let alm of almacenes" [value]="alm.almacen_id">
                {{ alm.nombre }}
              </option>
            </select>
          </c-col>
          <c-col md="2">
            <label cLabel>Inicio</label>
            <input cFormControl type="date" formControlName="fec_ini" (change)="onSearch()" />
          </c-col>
          <c-col md="2">
            <label cLabel>Fin</label>
            <input cFormControl type="date" formControlName="fec_fin" (change)="onSearch()" />
          </c-col>
          <c-col md="3" class="d-flex align-items-end gap-2">
            <button (click)="onSearch()" cButton color="primary">
              <svg cIcon name="cil-search"></svg>
              Buscar
            </button>
            <button (click)="onClean()" cButton color="danger">
              <svg cIcon name="cil-trash"></svg>
              Limpiar
            </button>
          </c-col>
        </form>

        <div class="table-responsive">
          <table [hover]="true" [striped]="true" cTable>
            <thead>
              <tr>
                <th># Mov</th>
                <th>Fecha</th>
                <th>Tipo</th>
                <th>Origen</th>
                <th>Destino</th>
                <th>Responsable</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of movimientos">
                <td>{{ item.mov_id }}</td>
                <td>{{ item.mov_fec | date: 'dd/MM/yyyy' }}</td>
                <td>
                  <span
                    class="badge"
                    [ngClass]="{
                      'bg-info': item.mov_tip === 'TRANSFERENCIA',
                      'bg-success': item.mov_tip === 'INGRESO',
                      'bg-danger': item.mov_tip === 'SALIDA',
                      'bg-warning': item.mov_tip === 'AJUSTE',
                    }"
                  >
                    {{ item.mov_tip }}
                  </span>
                </td>
                <td>{{ item.alm_ori_nom || '-' }}</td>
                <td>{{ item.alm_des_nom || '-' }}</td>
                <td>{{ item.usu_nom }}</td>
                <td class="text-end">
                  <button
                    [routerLink]="['/editar-movimiento', item.mov_id]"
                    cButton
                    color="warning"
                    size="sm"
                    class="me-1"
                  >
                    <svg cIcon name="cil-pencil"></svg>
                  </button>
                </td>
              </tr>
              <tr *ngIf="movimientos.length === 0">
                <td colspan="7" class="text-center py-3">No se encontraron movimientos</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="mt-3">
          <app-paginator
            [total]="total"
            [pageSize]="10"
            (pageChange)="onPageChange($event)"
          ></app-paginator>
        </div>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
